version: '3.8'

services:
  # Web Server — FastAPI dashboard, room management, content pipeline
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: podcast-studio-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8000
      - UPLOAD_DIR=/app/uploads
      - CHROMA_DB_PATH=/app/data/chroma
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - studio-network

  # Agent Worker — LiveKit AI co-host participant
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: podcast-studio-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
    depends_on:
      web:
        condition: service_healthy
    networks:
      - studio-network

networks:
  studio-network:
    driver: bridge
