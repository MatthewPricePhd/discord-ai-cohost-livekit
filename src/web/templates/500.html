{% extends "base.html" %}

{% block content %}
<div class="min-h-96 flex items-center justify-center">
    <div class="text-center">
        <div class="mb-8">
            <i class="fas fa-exclamation-triangle text-6xl text-red-500 mb-4"></i>
            <h1 class="text-9xl font-bold text-gray-600">500</h1>
        </div>
        
        <h2 class="text-2xl font-semibold text-gray-300 mb-4">
            Internal Server Error
        </h2>
        
        <p class="text-gray-500 mb-8 max-w-md mx-auto">
            The AI co-host encountered an unexpected error. 
            Please try again in a moment or check the system logs.
        </p>
        
        <div class="space-x-4">
            <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg transition-colors inline-flex items-center">
                <i class="fas fa-sync-alt mr-2"></i>
                Refresh Page
            </button>
            
            <a href="/" class="bg-gray-700 hover:bg-gray-600 text-white px-6 py-3 rounded-lg transition-colors inline-flex items-center">
                <i class="fas fa-home mr-2"></i>
                Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
