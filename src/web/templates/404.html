{% extends "base.html" %}

{% block content %}
<div class="min-h-96 flex items-center justify-center">
    <div class="text-center">
        <div class="mb-8">
            <i class="fas fa-robot text-6xl text-gray-600 mb-4"></i>
            <h1 class="text-9xl font-bold text-gray-600">404</h1>
        </div>
        
        <h2 class="text-2xl font-semibold text-gray-300 mb-4">
            Page Not Found
        </h2>
        
        <p class="text-gray-500 mb-8 max-w-md mx-auto">
            The AI co-host couldn't find the page you're looking for. 
            It might have been moved or doesn't exist.
        </p>
        
        <div class="space-x-4">
            <a href="/" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg transition-colors inline-flex items-center">
                <i class="fas fa-home mr-2"></i>
                Back to Dashboard
            </a>
            
            <button onclick="history.back()" class="bg-gray-700 hover:bg-gray-600 text-white px-6 py-3 rounded-lg transition-colors inline-flex items-center">
                <i class="fas fa-arrow-left mr-2"></i>
                Go Back
            </button>
        </div>
    </div>
</div>
{% endblock %}
